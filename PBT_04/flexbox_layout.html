<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodNow Flexbox</title>

    <link rel="stylesheet" href="flexbox.css" />
  </head>

  <body>

    <!-- NAVBAR -->
    <nav class="navbar">

      <a href="#" class="logo">
        FoodNow 🍔
      </a>

      <ul class="menu">
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Món ăn</a></li>
        <li><a href="#">Khuyến mãi</a></li>
      </ul>

      <div class="auth">
        <a href="#" class="login">Đăng nhập</a>
        <a href="#" class="register">Đăng ký</a>
      </div>

    </nav>

    <!-- PRODUCT GRID -->
    <section class="section">

      <h1>Món ăn nổi bật 🔥</h1>

      <div class="card-grid">

        <div class="card">
          <div class="img">🍕</div>
          <div class="body">
            <h2>Pizza</h2>
            <p>189.000đ</p>
            <button>Đặt món</button>
          </div>
        </div>

        <div class="card">
          <div class="img">🍔</div>
          <div class="body">
            <h2>Burger</h2>
            <p>99.000đ</p>
            <button>Đặt món</button>
          </div>
        </div>

        <div class="card">
          <div class="img">🍣</div>
          <div class="body">
            <h2>Sushi</h2>
            <p>220.000đ</p>
            <button>Đặt món</button>
          </div>
        </div>

        <div class="card">
          <div class="img">🍜</div>
          <div class="body">
            <h2>Ramen</h2>
            <p>145.000đ</p>
            <button>Đặt món</button>
          </div>
        </div>

        <div class="card">
          <div class="img">🍗</div>
          <div class="body">
            <h2>Gà rán</h2>
            <p>129.000đ</p>
            <button>Đặt món</button>
          </div>
        </div>

        <div class="card">
          <div class="img">🥗</div>
          <div class="body">
            <h2>Salad</h2>
            <p>75.000đ</p>
            <button>Đặt món</button>
          </div>
        </div>

        <div class="card">
          <div class="img">🧋</div>
          <div class="body">
            <h2>Trà sữa</h2>
            <p>55.000đ</p>
            <button>Đặt món</button>
          </div>
        </div>

        <div class="card">
          <div class="img">🍰</div>
          <div class="body">
            <h2>Bánh ngọt</h2>
            <p>69.000đ</p>
            <button>Đặt món</button>
          </div>
        </div>

      </div>

    </section>

  </body>
</html>
