<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Todo App</h1>

        <form id="todoForm">
            <input
                type="text"
                id="todoInput"
                placeholder="Nhập công việc..."
                required
            >

            <button type="submit">
                Add
            </button>
        </form>

        <ul id="todoList"></ul>

        <div class="footer">

            <span id="itemCount">
                0 items left
            </span>

            <div class="filters">

                <button
                    class="filter-btn active"
                    data-filter="all"
                >
                    All
                </button>

                <button
                    class="filter-btn"
                    data-filter="active"
                >
                    Active
                </button>

                <button
                    class="filter-btn"
                    data-filter="completed"
                >
                    Completed
                </button>

            </div>

            <button id="clearCompleted">
                Clear Completed
            </button>

        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
