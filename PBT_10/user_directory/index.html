<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="layout">
    <!-- Sidebar: Form -->
    <aside class="sidebar">
      <div class="logo">👥 UserDir</div>

      <div class="form-card">
        <h3 id="formTitle">Thêm người dùng</h3>
        <input type="hidden" id="editId" />
        <div class="field">
          <label>Họ tên *</label>
          <input type="text" id="name" placeholder="Nguyễn Văn A" />
        </div>
        <div class="field">
          <label>Email *</label>
          <input type="email" id="email" placeholder="example@email.com" />
        </div>
        <div class="field">
          <label>Điện thoại</label>
          <input type="text" id="phone" placeholder="0901 234 567" />
        </div>
        <div class="field">
          <label>Công ty</label>
          <input type="text" id="company" placeholder="Tên công ty" />
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="submitForm()">💾 Lưu</button>
          <button class="btn-ghost" onclick="cancelEdit()">Hủy</button>
        </div>
      </div>
    </aside>

    <!-- Main: Table -->
    <main class="main">
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchBox" placeholder="Tìm theo tên hoặc email..." oninput="filterUsers()" />
        </div>
        <span id="userCount" class="user-count"></span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Người dùng</th>
              <th>Email</th>
              <th>Điện thoại</th>
              <th>Công ty</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
