<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Product Page</title>
  <link rel="stylesheet" href="responsive.css">
</head>
<body>

<header class="header">
  <div class="logo">ShopDemo</div>

  <input type="checkbox" id="menu-toggle">
