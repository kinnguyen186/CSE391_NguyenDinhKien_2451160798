<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>B2 Animations</title>
  <link rel="stylesheet" href="animations.css">
</head>
<body>

<h1 class="title">Product Animation Demo</h1>

<!-- SPINNER -->
<div class="spinner"></div>

<div class="grid">

  <div class="card fade-in" style="animation-delay: 0s;">
    <div class="img-box">
      <img src="https://picsum.photos/seed/p1/300/200">
    </div>
    <h3>Product 1</h3>
    <p class="price">$120</p>
    <button>Mua ngay</button>
  </div>

  <div class="card fade-in" style="animation-delay: 0.1s;">
    <div class="img-box">
      <img src="https://picsum.photos/seed/p2/300/200">
    </div>
    <h3>Product 2</h3>
    <p class="price">$99</p>
    <button>Mua ngay</button>
  </div>

  <div class="card fade-in" style="animation-delay: 0.2s;">
    <div class="img-box">
      <img src="https://picsum.photos/seed/p3/300/200">
    </div>
    <h3>Product 3</h3>
    <p class="price">$150</p>
    <button>Mua ngay</button>
  </div>

  <div class="card fade-in" style="animation-delay: 0.3s;">
    <div class="img-box">
      <img src="https://picsum.photos/seed/p4/300/200">
    </div>
    <h3>Product 4</h3>
    <p class="price">$80</p>
    <button>Mua ngay</button>
  </div>

</div>

</body>
</html>
